name: Bug Report
description: File a bug report to help us improve FlipbookEngine
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Please provide a set of steps to reproduce the behavior.
      placeholder: |
        1. Initialize engine with '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  - type: input
    id: engine-version
    attributes:
      label: FlipbookEngine Version
      description: Which version of FlipbookEngine are you using?
      placeholder: e.g., 0.2.4
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: Which framework wrapper are you using?
      options:
        - Vanilla HTML/JS
        - React
        - Vue 3
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      description: E.g. Chrome 120 on Windows 11, or Safari on iOS 17
      placeholder: Chrome 120 / Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Logs
      description: Any relevant browser console errors or stack traces.
      render: shell
